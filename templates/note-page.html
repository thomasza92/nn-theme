{% extends "base.html" %}

{% block content %}
<div class="container max-w-4xl mx-auto px-4 py-10">
  <header class="mb-10 border-b border-gray-200 pb-6">
    <h1 class="font-bold font-sans break-normal text-gray-900 text-3xl md:text-4xl leading-tight">{{ page.title }}</h1>
  </header>

  <article class="prose prose-indigo prose-lg max-w-none prose-headings:font-bold prose-h2:mt-12 prose-h3:mt-8 prose-pre:rounded-lg prose-pre:p-4 prose-code:text-sm prose-img:rounded-lg">
    {{ macros::toc() }}
    {{ page.content | safe }}
    {% if page.extra.external_link %}<p><a href="{{page.extra.external_link | safe}}" target="_blank">{{page.extra.external_link | safe}}</a></p>{% endif -%}
  </article>
</div>
{% endblock content %}
