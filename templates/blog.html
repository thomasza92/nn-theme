{% extends "base.html" %}

{% block content %}
<div class="container max-w-4xl mx-auto px-4 py-8">
  <h1 class="font-bold font-sans break-normal text-center text-gray-900 text-3xl md:text-4xl">{{ section.title }}</h1>

  <ul class="text-base leading-normal text-gray-800" style="list-style-type: disc; list-style-position: outside; margin: 3rem auto 0 auto; padding-left: 1.25rem; max-width: 48rem;">
    {% for page in section.pages %}
    <li style="padding-left: 0.5rem; margin-bottom: 1.5rem;">
      <div class="font-bold text-gray-900">
        <a class="blog-list-title text-gray-900 underline decoration-gray-500 underline-offset-4 hover:text-gray-700 hover:decoration-gray-700" href="{{ page.permalink | safe }}">{{ page.title }}</a>
        {% if page.date %}<span class="font-normal text-gray-800"> - {{ page.date | date(format="%B %d, %Y") }}</span>{% endif %}
      </div>
    </li>
    {% endfor %}
  </ul>
</div>
{% endblock content %}
